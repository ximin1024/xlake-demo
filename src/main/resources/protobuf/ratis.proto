syntax = "proto3";

package nebulake.meta;

option java_package = "io.github.ximin.xlake.meta";
option java_multiple_files = true;

import "schema.proto";

// ==================== Ratis Raft 日志信封 ====================
// 所有通过 Ratis 传输的操作都封装在这个 Envelope 中

message RaftOpEnvelope {
  string op_type = 1;  // PUT | DELETE | GET | SCAN_PREFIX
  bytes payload = 2;   // 对应操作的 protobuf 序列化
}

// ==================== Ratis KV 原语（内部使用）====================

message PutRequest {
  bytes key = 1;
  bytes value = 2;
}

message GetRequest {
  bytes key = 1;
}

message GetResponse {
  bytes value = 1;
}

message DeleteRequest {
  bytes key = 1;
}

message ScanPrefixRequest {
  bytes prefix = 1;
}

message ScanPrefixResponse {
  repeated bytes values = 1;
}
