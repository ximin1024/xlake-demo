syntax = "proto3";

package nebulake.meta;

option java_package = "io.github.ximin.xlake.meta";
option java_multiple_files = true;

// ==================== Ratis Raft 日志信封 ====================
// 所有通过 Ratis 传输的操作都封装在这个 Envelope 中

message PbRaftOpEnvelope {
  string op_type = 1;  // PUT | DELETE | GET | SCAN_PREFIX
  bytes payload = 2;   // 对应操作的 protobuf 序列化
}

// ==================== Ratis KV 原语（内部使用）====================

message PbPutRequest {
  bytes key = 1;
  bytes value = 2;
}

message PbGetRequest {
  bytes key = 1;
}

message PbGetResponse {
  bytes value = 1;
}

message PbDeleteRequest {
  bytes key = 1;
}

message PbScanPrefixRequest {
  bytes prefix = 1;
}

message PbScanPrefixResponse {
  repeated bytes values = 1;
}
