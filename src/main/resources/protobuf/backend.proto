syntax = "proto3";

package com.distdb.spark.server;

option java_package = "io.github.ximin.xlake.server";
option java_outer_classname = "QueryServerProto";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// ================== 基础消息类型 ==================

/**
 * 通用响应状态
 */
message Status {
  enum Code {
    OK = 0;
    CANCELLED = 1;
    UNKNOWN = 2;
    INVALID_ARGUMENT = 3;
    DEADLINE_EXCEEDED = 4;
    NOT_FOUND = 5;
    ALREADY_EXISTS = 6;
    PERMISSION_DENIED = 7;
    RESOURCE_EXHAUSTED = 8;
    FAILED_PRECONDITION = 9;
    ABORTED = 10;
    OUT_OF_RANGE = 11;
    UNIMPLEMENTED = 12;
    INTERNAL = 13;
    UNAVAILABLE = 14;
    DATA_LOSS = 15;
    UNAUTHENTICATED = 16;
  }

  Code code = 1;
  string message = 2;
  map<string, string> details = 3;
}

/**
 * Job状态枚举
 */
enum JobState {
  PENDING = 0;
  SUBMITTED = 1;
  RUNNING = 2;
  SUCCEEDED = 3;
  FAILED = 4;
  CANCELLING = 5;
  CANCELLED = 6;
  TIMED_OUT = 7;
  SKIPPED = 8;
}

/**
 * 查询类型
 */
enum QueryType {
  SQL = 0;
  DDL = 1;
  DML = 2;
  ANALYZE = 3;
  EXPLAIN = 4;
  SHOW = 5;
  DESCRIBE = 6;
}

// ================== Query Service ==================

/**
 * 查询请求
 */
message QueryRequest {
  string id = 1;                      // 请求ID，客户端生成
  string sql = 2;                     // SQL语句
  QueryType type = 3;                 // 查询类型
  map<string, string> parameters = 4; // 查询参数

  // 执行选项
  message ExecutionOptions {
    int64 timeout_seconds = 1;        // 超时时间(秒)
    int64 max_rows = 2;               // 最大返回行数
    bool collect_to_driver = 3;       // 是否收集到Driver
    string output_format = 4;         // 输出格式：json, csv, parquet等
    string output_path = 5;           // 输出路径
    string result_table = 6;          // 结果表名
    int32 priority = 7;               // 优先级 1-10
    bool async = 8;                   // 是否异步执行
    bool cache_result = 9;            // 是否缓存结果
    int32 max_retries = 10;           // 最大重试次数
    bool dry_run = 11;                // 干跑模式
  }

  ExecutionOptions options = 5;

  // 会话上下文
  message SessionContext {
    string session_id = 1;
    string user_id = 2;
    string database = 3;
    map<string, string> configs = 4;  // Spark配置
    google.protobuf.Timestamp create_time = 5;
  }

  SessionContext session = 6;

  // 分区信息（用于数据本地性）
  message PartitionInfo {
    string table_name = 1;
    repeated string partition_keys = 2;
    map<string, string> partition_values = 3;
  }

  repeated PartitionInfo partitions = 7;
}

/**
 * 查询响应（流式）
 */
message QueryResponse {
  string request_id = 1;
  string job_id = 2;

  // 进度信息
  message Progress {
    double completed_fraction = 1;    // 完成比例 0-1
    int64 rows_processed = 2;         // 已处理行数
    int64 bytes_processed = 3;        // 已处理字节数
    int32 stage_id = 4;               // 当前Stage ID
    int32 task_id = 5;                // 当前Task ID
    string stage_name = 6;            // Stage名称
  }

  oneof content {
    JobState state = 3;               // Job状态更新
    Progress progress = 4;            // 进度更新
    ResultChunk result_chunk = 5;     // 结果数据块
    string message = 6;               // 消息
    Status error = 7;                 // 错误信息
  }
}

/**
 * 结果数据块
 */
message ResultChunk {
  int32 chunk_id = 1;
  bool is_first = 2;
  bool is_last = 3;
  int32 total_chunks = 4;

  message Metadata {
    repeated ColumnSchema columns = 1;
    int64 total_rows = 2;
    int64 total_bytes = 3;
    google.protobuf.Timestamp start_time = 4;
    google.protobuf.Timestamp end_time = 5;
  }

  Metadata metadata = 5;

  // 数据格式
  enum DataFormat {
    JSON = 0;
    ARROW = 1;
    PROTOBUF = 2;
    CSV = 3;
    PARQUET = 4;
    RAW_BYTES = 5;
  }

  DataFormat format = 6;
  bytes data = 7;                     // 序列化的数据

  // 列统计信息
  repeated ColumnStats column_stats = 8;
}

/**
 * 列模式
 */
message ColumnSchema {
  string name = 1;
  string type = 2;
  bool nullable = 3;
  map<string, string> metadata = 4;
}

/**
 * 列统计信息
 */
message ColumnStats {
  string column_name = 1;
  int64 null_count = 2;
  double min_value = 3;               // 数值类型
  double max_value = 4;               // 数值类型
  double avg_value = 5;               // 数值类型
  string min_string = 6;              // 字符串类型
  string max_string = 7;              // 字符串类型
  int64 distinct_count = 8;           // 去重计数
  bytes histogram = 9;                // 直方图数据
}

// ================== Job Management Service ==================

/**
 * Job信息
 */
message JobInfo {
  string job_id = 1;
  string name = 2;
  string description = 3;
  JobState state = 4;

  // 时间戳
  google.protobuf.Timestamp submit_time = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  google.protobuf.Duration duration = 8;

  // 进度
  double progress = 9;
  int64 rows_processed = 10;
  int64 bytes_processed = 11;

  // 配置
  string sql = 12;
  map<string, string> configs = 13;

  // 资源使用
  message ResourceUsage {
    int64 executor_memory_mb = 1;
    int32 executor_cores = 2;
    int64 driver_memory_mb = 3;
    int64 memory_bytes_spilled = 4;
    int64 disk_bytes_spilled = 5;
  }

  ResourceUsage resources = 14;

  // 错误信息
  string error_message = 15;
  string error_stack_trace = 16;

  // 执行计划
  string logical_plan = 17;
  string physical_plan = 18;

  // 执行器信息
  repeated string executor_ids = 19;
}

/**
 * Job过滤条件
 */
message JobFilter {
  repeated string job_ids = 1;
  repeated JobState states = 2;
  google.protobuf.Timestamp start_time_from = 3;
  google.protobuf.Timestamp start_time_to = 4;
  string user_id = 5;
  string session_id = 6;
  string sql_pattern = 7;
  int32 limit = 8;
  int32 offset = 9;
  string sort_by = 10;                // submit_time, start_time, duration
  bool sort_desc = 11;
}

/**
 * Job列表响应
 */
message JobList {
  repeated JobInfo jobs = 1;
  int32 total_count = 2;
  int32 filtered_count = 3;
  google.protobuf.Timestamp query_time = 4;
}

/**
 * Job Metrics
 */
message JobMetrics {
  string job_id = 1;

  // 时间指标
  google.protobuf.Duration total_time = 2;
  google.protobuf.Duration scheduling_delay = 3;
  google.protobuf.Duration executor_run_time = 4;
  google.protobuf.Duration result_serialization_time = 5;
  google.protobuf.Duration gc_time = 6;

  // 任务指标
  int32 total_tasks = 7;
  int32 completed_tasks = 8;
  int32 failed_tasks = 9;
  int32 killed_tasks = 10;

  // 数据指标
  int64 input_bytes = 11;
  int64 output_bytes = 12;
  int64 shuffle_read_bytes = 13;
  int64 shuffle_write_bytes = 14;
  int64 memory_bytes_spilled = 15;
  int64 disk_bytes_spilled = 16;

  // 执行器指标
  repeated ExecutorMetrics executors = 17;

  // Stage指标
  repeated StageMetrics stages = 18;
}

/**
 * Executor Metrics
 */
message ExecutorMetrics {
  string id = 1;
  string host = 2;
  int32 port = 3;

  // 资源使用
  int64 total_memory_mb = 4;
  int64 used_memory_mb = 5;
  int32 total_cores = 6;
  int32 used_cores = 7;

  // 任务统计
  int32 total_tasks = 8;
  int32 completed_tasks = 9;
  int32 failed_tasks = 10;
  int64 total_duration_ms = 11;

  // GC统计
  int64 gc_count = 12;
  int64 gc_time_ms = 13;

  // 网络统计
  int64 bytes_received = 14;
  int64 bytes_sent = 15;
}

/**
 * Stage Metrics
 */
message StageMetrics {
  int32 stage_id = 1;
  string name = 2;
  int32 num_tasks = 3;
  int32 completed_tasks = 4;
  int32 failed_tasks = 5;
  int64 input_bytes = 6;
  int64 output_bytes = 7;
  int64 shuffle_read_bytes = 8;
  int64 shuffle_write_bytes = 9;
  google.protobuf.Duration duration = 10;
}

// ================== Session Management Service ==================

/**
 * 会话信息
 */
message SessionInfo {
  string session_id = 1;
  string user_id = 2;
  string application_id = 3;

  // 时间信息
  google.protobuf.Timestamp create_time = 4;
  google.protobuf.Timestamp last_access_time = 5;
  google.protobuf.Duration idle_time = 6;

  // 配置
  string default_database = 7;
  map<string, string> configs = 8;

  // 统计信息
  int64 total_queries = 9;
  int64 successful_queries = 10;
  int64 failed_queries = 11;
  google.protobuf.Duration total_query_time = 12;

  // 资源使用
  int64 memory_used_mb = 13;
  repeated string active_jobs = 14;
  repeated string cached_tables = 15;
}

/**
 * 会话配置
 */
message SessionConfig {
  string session_id = 1;
  map<string, string> spark_configs = 2;
  string database = 3;
  string warehouse_dir = 4;
  bool enable_hive_support = 5;
  bool enable_adaptive_execution = 6;
  int32 shuffle_partitions = 7;
  int64 auto_broadcast_threshold = 8;
}

/**
 * 会话创建请求
 */
message CreateSessionRequest {
  string user_id = 1;
  string application_name = 2;
  SessionConfig config = 3;
  map<string, string> properties = 4;
}

/**
 * 会话创建响应
 */
message CreateSessionResponse {
  string session_id = 1;
  Status status = 2;
  SessionInfo session_info = 3;
}

// ================== Table Management Service ==================

/**
 * 表信息
 */
message TableInfo {
  string database = 1;
  string table_name = 2;
  string table_type = 3;  // MANAGED, EXTERNAL, VIEW

  // 存储信息
  message StorageInfo {
    string format = 1;    // parquet, orc, json, csv
    string location = 2;
    bool compressed = 3;
    map<string, string> properties = 4;
  }

  StorageInfo storage = 4;

  // Schema信息
  repeated ColumnSchema columns = 5;
  repeated ColumnSchema partition_columns = 6;

  // 统计信息
  int64 num_rows = 7;
  int64 total_size_bytes = 8;
  map<string, bytes> column_statistics = 9;

  // 创建信息
  string created_by = 10;
  google.protobuf.Timestamp create_time = 11;
  google.protobuf.Timestamp last_access_time = 12;

  // 属性
  map<string, string> properties = 13;
}

/**
 * 创建表请求
 */
message CreateTableRequest {
  string database = 1;
  string table_name = 2;
  repeated ColumnSchema columns = 3;
  repeated ColumnSchema partition_columns = 4;

  // 存储格式
  string format = 5;
  string location = 6;
  map<string, string> tbl_properties = 7;

  // 选项
  bool if_not_exists = 8;
  bool is_external = 9;
  string comment = 10;

  // 数据来源
  oneof source {
    string select_sql = 11;          // CTAS
    string data_path = 12;           // 从数据路径创建
    TableInfo like_table = 13;       // LIKE table
  }
}

/**
 * 分区信息
 */
message PartitionInfo {
  string database = 1;
  string table_name = 2;
  map<string, string> values = 3;
  string location = 4;
  string format = 5;
  int64 num_rows = 6;
  int64 total_size_bytes = 7;
  google.protobuf.Timestamp create_time = 8;
  google.protobuf.Timestamp last_access_time = 9;
  map<string, bytes> column_statistics = 10;
}

/**
 * 分区列表
 */
message PartitionList {
  repeated PartitionInfo partitions = 1;
  int32 total_count = 2;
  bool has_more = 3;
  string next_token = 4;
}

// ================== Cluster Management Service ==================

/**
 * 集群状态
 */
message ClusterStatus {
  // Driver状态
  message DriverStatus {
    string id = 1;
    string host = 2;
    int32 port = 3;
    string state = 4;
    google.protobuf.Timestamp start_time = 5;
    int64 memory_used_mb = 6;
    int64 memory_total_mb = 7;
    int32 cores_used = 8;
    int32 cores_total = 9;
  }

  DriverStatus driver = 1;

  // Executor状态
  repeated ExecutorStatus executors = 2;

  // 应用状态
  string application_id = 3;
  string application_state = 4;
  int32 num_running_jobs = 5;
  int32 num_pending_jobs = 6;
  int32 num_failed_jobs = 7;

  // 资源状态
  int64 total_memory_mb = 8;
  int64 used_memory_mb = 9;
  int32 total_cores = 10;
  int32 used_cores = 11;

  // 调度器状态
  string scheduler_mode = 12;
  repeated PoolInfo pools = 13;
}

/**
 * Executor状态
 */
message ExecutorStatus {
  string id = 1;
  string host = 2;
  int32 port = 3;
  string state = 4;  // ALIVE, DEAD, UNKNOWN

  // 资源使用
  int64 memory_used_mb = 5;
  int64 memory_total_mb = 6;
  int32 cores_used = 7;
  int32 cores_total = 8;

  // 任务统计
  int32 active_tasks = 9;
  int32 completed_tasks = 10;
  int32 failed_tasks = 11;

  // 时间信息
  google.protobuf.Timestamp register_time = 12;
  google.protobuf.Timestamp last_heartbeat = 13;

  // 网络信息
  int64 bytes_received = 14;
  int64 bytes_sent = 15;
}

/**
 * 调度池信息
 */
message PoolInfo {
  string name = 1;
  int32 min_share = 2;
  int32 weight = 3;
  int32 running_tasks = 4;
  int32 pending_tasks = 5;
  string scheduling_mode = 6;
}

/**
 * 应用Metrics
 */
message ApplicationMetrics {
  // JVM Metrics
  message JVMMetrics {
    int64 heap_used_mb = 1;
    int64 heap_max_mb = 2;
    int64 non_heap_used_mb = 3;
    int64 gc_count = 4;
    int64 gc_time_ms = 5;
    int32 threads = 6;
    int32 daemon_threads = 7;
  }

  JVMMetrics driver_jvm = 1;
  repeated JVMMetrics executor_jvms = 2;

  // Spark Metrics
  message SparkInternalMetrics {
    int64 executor_run_time = 1;
    int64 executor_cpu_time = 2;
    int64 result_serialization_time = 3;
    int64 jvm_gc_time = 4;
    int64 result_size = 5;
    int64 disk_bytes_spilled = 6;
    int64 memory_bytes_spilled = 7;
    int64 peak_execution_memory = 8;
    int64 records_read = 9;
    int64 bytes_read = 10;
    int64 records_written = 11;
    int64 bytes_written = 12;
    int64 shuffle_bytes_read = 13;
    int64 shuffle_bytes_written = 14;
    int64 shuffle_records_read = 15;
    int64 shuffle_records_written = 16;
  }

  SparkInternalMetrics metrics = 3;

  // 时间序列数据
  repeated MetricDataPoint time_series = 4;
}

/**
 * Metrics数据点
 */
message MetricDataPoint {
  google.protobuf.Timestamp timestamp = 1;
  map<string, double> values = 2;
  map<string, string> labels = 3;
}

message EnvironmentConf {
  map<string, string> conf = 1;
}

// ================== Service Definitions ==================

/**
 * 查询服务
 * 处理SQL查询和DML操作
 */
service QueryService {
  // 执行查询（流式响应）
  rpc ExecuteQuery(QueryRequest) returns (stream QueryResponse);

  // 提交查询（异步）
  rpc SubmitQuery(QueryRequest) returns (QueryResponse);

  // 获取查询状态
  rpc GetQueryStatus(QueryRequest) returns (QueryResponse);

  // 取消查询
  rpc CancelQuery(QueryRequest) returns (QueryResponse);

  // 获取查询结果（分页）
  rpc GetQueryResult(QueryRequest) returns (stream ResultChunk);

  // 解释执行计划
  rpc ExplainQuery(QueryRequest) returns (QueryResponse);

  // 分析表/列统计信息
  rpc AnalyzeTable(QueryRequest) returns (QueryResponse);

  // 测试查询语法
  rpc ValidateQuery(QueryRequest) returns (QueryResponse);
}

/**
 * Job管理服务
 * 管理Spark Job的生命周期
 */
service JobManagementService {
  // 获取Job列表
  rpc ListJobs(JobFilter) returns (JobList);

  // 获取Job详细信息
  rpc GetJobInfo(JobInfo) returns (JobInfo);

  // 获取Job Metrics
  rpc GetJobMetrics(JobInfo) returns (JobMetrics);

  // 杀死Job
  rpc KillJob(JobInfo) returns (Status);

  // 重试失败的Job
  rpc RetryJob(JobInfo) returns (Status);

  // 清理完成的Job
  rpc CleanupJobs(JobFilter) returns (Status);

  // 监控Job进度（流式）
  rpc MonitorJob(JobInfo) returns (stream JobInfo);

  // 获取Job日志
  rpc GetJobLogs(JobInfo) returns (stream LogMessage);
}

/**
 * 会话管理服务
 * 管理用户会话
 */
service SessionManagementService {
  // 创建会话
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);

  // 关闭会话
  rpc CloseSession(SessionInfo) returns (Status);

  // 获取会话信息
  rpc GetSessionInfo(SessionInfo) returns (SessionInfo);

  // 更新会话配置
  rpc UpdateSessionConfig(SessionConfig) returns (Status);

  // 列出所有会话
  rpc ListSessions(google.protobuf.Empty) returns (stream SessionInfo);

  // 续期会话
  rpc RenewSession(SessionInfo) returns (Status);

  // 清理空闲会话
  rpc CleanupIdleSessions(google.protobuf.Duration) returns (Status);
}

/**
 * 表管理服务
 * 管理数据库和表
 */
service TableManagementService {
  // 创建表
  rpc CreateTable(CreateTableRequest) returns (Status);

  // 删除表
  rpc DropTable(TableInfo) returns (Status);

  // 获取表信息
  rpc GetTableInfo(TableInfo) returns (TableInfo);

  // 列出所有表
  rpc ListTables(TableInfo) returns (stream TableInfo);

  // 描述表
  rpc DescribeTable(TableInfo) returns (TableInfo);

  // 修改表
  rpc AlterTable(TableInfo) returns (Status);

  // 刷新表元数据
  rpc RefreshTable(TableInfo) returns (Status);

  // 获取分区信息
  rpc GetPartitions(TableInfo) returns (PartitionList);

  // 添加分区
  rpc AddPartition(PartitionInfo) returns (Status);

  // 删除分区
  rpc DropPartition(PartitionInfo) returns (Status);

  // 修复分区
  rpc RepairPartition(PartitionInfo) returns (Status);
}

/**
 * 集群管理服务
 * 管理Spark集群状态
 */
service ClusterManagementService {
  // 获取集群状态
  rpc GetClusterStatus(google.protobuf.Empty) returns (ClusterStatus);

  // 获取Executor信息
  rpc GetExecutorInfo(google.protobuf.Empty) returns (stream ExecutorStatus);

  // 获取应用Metrics
  rpc GetApplicationMetrics(google.protobuf.Empty) returns (ApplicationMetrics);

  // 获取Driver日志
  rpc GetDriverLogs(google.protobuf.Empty) returns (stream LogMessage);

  // 获取环境配置
  rpc GetEnvironmentConfig(google.protobuf.Empty) returns (EnvironmentConf);

  // 动态调整资源
  rpc AdjustResources(ResourceRequest) returns (Status);

  // 重新调度Executor
  rpc RestartExecutor(ExecutorStatus) returns (Status);

  // 优雅停止
  rpc GracefulShutdown(google.protobuf.Duration) returns (Status);
}

/**
 * 监控告警服务
 * 监控系统状态和发送告警
 */
service MonitorService {
  // 订阅监控事件
  rpc SubscribeMetrics(MetricSubscription) returns (stream MetricDataPoint);

  // 获取健康状态
  rpc GetHealthStatus(google.protobuf.Empty) returns (HealthStatus);

  // 设置告警规则
  rpc SetAlertRule(AlertRule) returns (Status);

//  // 获取告警列表
//  rpc GetAlerts(AlertFilter) returns (stream Alert);
//
//  // 清除告警
//  rpc ClearAlerts(AlertFilter) returns (Status);

  // 获取性能报告
  rpc GetPerformanceReport(ReportRequest) returns (PerformanceReport);

  // 获取慢查询报告
  rpc GetSlowQueryReport(ReportRequest) returns (SlowQueryReport);
}

