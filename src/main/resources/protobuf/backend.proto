// ================== 补充消息类型 ==================

/**
 * 资源请求
 */
message ResourceRequest {
  enum ResourceType {
    EXECUTOR_MEMORY = 0;
    EXECUTOR_CORES = 1;
    DRIVER_MEMORY = 2;
    EXECUTOR_INSTANCES = 3;
  }

  ResourceType type = 1;
  int64 amount = 2;
  string unit = 3;  // MB, GB, cores
  google.protobuf.Duration duration = 4;  // 持续时间
  string reason = 5;
}

/**
 * 日志消息
 */
message LogMessage {
  enum LogLevel {
    TRACE = 0;
    DEBUG = 1;
    INFO = 2;
    WARN = 3;
    ERROR = 4;
    FATAL = 5;
  }

  LogLevel level = 1;
  string logger = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
  string thread = 5;
  string stack_trace = 6;
  map<string, string> mdc = 7;  // Mapped Diagnostic Context
}

/**
 * 健康状态
 */
message HealthStatus {
  enum Status {
    HEALTHY = 0;
    DEGRADED = 1;
    UNHEALTHY = 2;
    UNKNOWN = 3;
  }

  Status status = 1;
  google.protobuf.Timestamp check_time = 2;
  map<string, ComponentHealth> components = 3;
  repeated string issues = 4;
}

/**
 * 组件健康状态
 */
message ComponentHealth {
  enum Status {
    UP = 0;
    DOWN = 1;
    UNKNOWN = 2;
  }

  Status status = 1;
  string message = 2;
  google.protobuf.Timestamp last_check = 3;
  google.protobuf.Duration response_time = 4;
}

/**
 * Metric订阅
 */
message MetricSubscription {
  repeated string metric_names = 1;
  google.protobuf.Duration sample_interval = 2;
  google.protobuf.Duration duration = 3;
  map<string, string> filters = 4;
}

/**
 * 告警规则
 */
message AlertRule {
  string id = 1;
  string name = 2;
  string description = 3;

  message Condition {
    string metric = 1;
    string operator = 2;  // >, <, >=, <=, ==, !=
    double threshold = 3;
    google.protobuf.Duration duration = 4;
  }

  Condition condition = 4;

  // 告警动作
  message Action {
    enum ActionType {
      NOTIFY = 0;
      SCALE = 1;
      RESTART = 2;
      STOP = 3;
    }

    ActionType type = 1;
    map<string, string> parameters = 2;
  }

  repeated Action actions = 5;

  // 抑制规则
  message Suppression {
    google.protobuf.Duration duration = 1;
    int32 max_alerts = 2;
  }

  Suppression suppression = 6;

  bool enabled = 7;
  google.protobuf.Timestamp create_time = 8;
}

/**
 * 告警
 */
message Alert {
  string id = 1;
  string rule_id = 2;
  AlertRule rule = 3;

  enum Severity {
    INFO = 0;
    WARNING = 1;
    ERROR = 2;
    CRITICAL = 3;
  }

  Severity severity = 4;
  string message = 5;
  map<string, string> labels = 6;
  map<string, string> annotations = 7;

  google.protobuf.Timestamp start_time = 8;
  google.protobuf.Timestamp end_time = 9;
  AlertState state = 10;

  repeated string affected_components = 11;
}

/**
 * 告警状态
 */
enum AlertState {
  FIRING = 0;
  RESOLVED = 1;
  SUPPRESSED = 2;
}

/**
 * 告警过滤器
 */
//message AlertFilter {
//  repeated string alert_ids = 1;
//  repeated AlertState states = 2;
//  repeated AlertRule.Severity severities = 3;
//  google.protobuf.Timestamp start_time_from = 4;
//  google.protobuf.Timestamp start_time_to = 5;
//  repeated string rule_ids = 6;
//  bool active_only = 7;
//}

/**
 * 报告请求
 */
message ReportRequest {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
  repeated string metrics = 3;
  string format = 4;  // json, csv, html, pdf
  int32 limit = 5;
}

/**
 * 性能报告
 */
message PerformanceReport {
  google.protobuf.Timestamp generation_time = 1;
  google.protobuf.Timestamp period_start = 2;
  google.protobuf.Timestamp period_end = 3;

  // 查询性能
  message QueryPerformance {
    int64 total_queries = 1;
    int64 successful_queries = 2;
    int64 failed_queries = 3;
    google.protobuf.Duration avg_query_time = 4;
    google.protobuf.Duration p95_query_time = 5;
    google.protobuf.Duration p99_query_time = 6;
    repeated SlowQueryInfo slow_queries = 7;
  }

  QueryPerformance query_performance = 4;

  // 资源使用
  message ResourceUsage {
    double avg_cpu_utilization = 1;
    double avg_memory_utilization = 2;
    double avg_disk_io = 3;
    double avg_network_io = 4;
    repeated ResourcePeak peaks = 5;
  }

  ResourceUsage resource_usage = 5;

  // 系统可用性
  message SystemAvailability {
    double uptime_percentage = 1;
    int32 total_downtime_minutes = 2;
    repeated SystemOutage outages = 3;
    double sla_compliance = 4;
  }

  SystemAvailability availability = 6;

  bytes report_data = 7;  // 序列化的报告数据
}

/**
 * 慢查询信息
 */
message SlowQueryInfo {
  string query_id = 1;
  string sql = 2;
  google.protobuf.Duration duration = 3;
  int64 rows_processed = 4;
  google.protobuf.Timestamp execution_time = 5;
  string user_id = 6;
  string session_id = 7;
  repeated string issues = 8;  // 性能问题
  string recommendation = 9;   // 优化建议
}

/**
 * 资源峰值
 */
message ResourcePeak {
  string resource_type = 1;
  double peak_value = 2;
  google.protobuf.Timestamp peak_time = 3;
  double avg_value = 4;
}

/**
 * 系统中断
 */
message SystemOutage {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
  google.protobuf.Duration duration = 3;
  string cause = 4;
  string impact = 5;
  string resolution = 6;
}

/**
 * 慢查询报告
 */
message SlowQueryReport {
  google.protobuf.Timestamp generation_time = 1;
  repeated SlowQueryInfo slow_queries = 2;
  int32 total_slow_queries = 3;
  map<string, int32> slow_queries_by_user = 4;
  map<string, int32> slow_queries_by_table = 5;
  repeated string common_patterns = 6;
}

/**
 * 数据导入请求
 */
message ImportRequest {
  string source_type = 1;  // file, database, stream
  string source_uri = 2;
  string target_table = 3;
  string format = 4;

  message ImportOptions {
    bool overwrite = 1;
    string partition_by = 2;
    int32 batch_size = 3;
    int32 max_errors = 4;
    bool skip_header = 5;
    string encoding = 6;
    string delimiter = 7;
  }

  ImportOptions options = 5;
}

/**
 * 导入进度
 */
message ImportProgress {
  string import_id = 1;
  double progress = 2;
  int64 rows_imported = 3;
  int64 bytes_imported = 4;
  google.protobuf.Duration elapsed_time = 5;
  google.protobuf.Duration estimated_remaining = 6;
  string status = 7;
  repeated string errors = 8;
}

/**
 * 数据导出请求
 */
message ExportRequest {
  string source_table = 1;
  string target_type = 2;  // file, database, etc.
  string target_uri = 3;
  string format = 4;

  message ExportOptions {
    string query = 1;
    repeated string columns = 2;
    string partition_filter = 3;
    int32 max_file_size = 4;
    bool compress = 5;
    string compression_codec = 6;
  }

  ExportOptions options = 5;
}