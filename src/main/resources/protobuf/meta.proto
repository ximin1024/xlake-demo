syntax = "proto3";

package xlake.meta;

option java_package = "io.github.ximin.xlake.meta";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

// ==================== 类型系统 ====================

enum PrimitiveType {
  PRIMITIVE_TYPE_UNSPECIFIED = 0;
  BOOLEAN = 1;
  INT8 = 2;
  INT16 = 3;
  INT32 = 4;
  INT64 = 5;
  FLOAT32 = 6;
  FLOAT64 = 7;
  DECIMAL = 8;
  STRING = 9;
  BINARY = 10;
  DATE = 11;
  TIMESTAMP = 12;
}

message PbDataType {
  PrimitiveType primitive_type = 1;
  optional int32 precision = 2;
  optional int32 scale = 3;
  bool is_nullable = 4;
}

message PbStructField {
  string field_name = 1;
  PbDataType data_type = 2;
  optional string comment = 3;
}

message PbStructType {
  repeated PbStructField fields = 1;
}

// ==================== Schema & 约束 ====================

message PbPrimaryKeyConstraint {
  repeated string field_names = 1;
}

message PbSchema {
  PbStructType struct_type = 1;
  map<string, string> properties = 2;
  int64 version = 3;
  repeated PbPrimaryKeyConstraint constraints = 4;
}

// ==================== 快照 ====================

message PbSnapshot {
  int64 snapshot_id = 1;
  string manifest_list = 2;
  int64 timestamp = 3;
  string summary = 4;
  string operation = 5;
  PbSchema schema = 6;
}

// ==================== 分桶与分区 ====================

enum BucketTransform {
  BUCKET_TRANSFORM_UNSPECIFIED = 0;
  IDENTITY = 1;       // 原值（无分区，单桶）
  HASH = 2;           // Hash 分桶
  RANGE = 3;          // Range 分区
  VALUE = 4;          // Value 分区（离散值分区）
}

message PbBucketSpec {
  string source_column = 1;
  BucketTransform transform = 2;
  int32 num_buckets = 3;          // 0 表示由 transform 决定数量
  bool hidden = 4;                // 单桶时是否隐藏目录层级
}

message PbPartitionSpec {
  repeated PbBucketSpec bucket_specs = 1;     // 多级分桶规则
  int32 partition_fields_count = 2;         // 参与分区的字段数
}

// ==================== 隐藏列配置 ====================

enum HiddenColumnType {
  HIDDEN_COLUMN_TYPE_UNSPECIFIED = 0;
  ROW_NUMBER = 1;              // 行号（所有表都有）
  HIDDEN_PRIMARY_KEY = 2;      // 隐藏自增主键（仅 AppendOnly）
  COMMIT_TIMESTAMP = 3;        // 提交时间戳
  OPERATION_TYPE = 4;          // 操作类型标记
}

message PbHiddenColumnDef {
  HiddenColumnType type = 1;
  string column_name = 2;      // 实际列名如 _row_number
  PbDataType data_type = 3;
  bool visible = 4;            // 用户是否可见
}

message PbHiddenColumnConfig {
  repeated PbHiddenColumnDef columns = 1;
}

// ==================== 表元数据 ====================

enum TableType {
  TABLE_TYPE_UNSPECIFIED = 0;
  PRIMARY_KEY = 1;
  APPEND_ONLY = 2;
}

message PbTableIdentifier {
  string catalog = 1;           // 目录名（默认 "default"）
  string database = 2;          // 数据库名
  string table = 3;             // 表名
}

message PbTableMetadata {
  PbTableIdentifier identifier = 1;
  int64 table_id = 2;           // 全局唯一表ID
  TableType table_type = 3;
  PbSchema schema = 4;
  PbPrimaryKeyConstraint primary_key = 5;
  PbPartitionSpec partition_spec = 6;
  PbHiddenColumnConfig hidden_columns = 7;
  PbSnapshot current_snapshot = 8;
  map<string, string> properties = 9;
  string location = 10;         // 数据存储路径
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// ==================== Expression（核心能力）====================

enum ExprType {
  EXPR_TYPE_UNSPECIFIED = 0;
  LITERAL = 1;
  COLUMN_REF = 2;
  EQUAL = 3;
  NOT_EQUAL = 4;
  GREATER_THAN = 5;
  GREATER_THAN_OR_EQUAL = 6;
  LESS_THAN = 7;
  LESS_THAN_OR_EQUAL = 8;
  IN = 9;
  NOT_IN = 10;
  AND = 11;
  OR = 12;
  NOT = 13;
  BETWEEN = 14;
  LIKE = 15;
  STARTS_WITH = 16;
  ENDS_WITH = 17;
  CONTAINS = 18;
  IS_NULL = 19;
  IS_NOT_NULL = 20;
  DIRECT = 21;
  ARITHMETIC_ADD = 22;
  ARITHMETIC_SUBTRACT = 23;
  ARITHMETIC_MULTIPLY = 24;
  ARITHMETIC_DIVIDE = 25;
}

message PbLiteralValue {
  oneof value {
    bool bool_val = 1;
    int32 int32_val = 2;
    int64 int64_val = 3;
    float float_val = 4;
    double double_val = 5;
    string string_val = 6;
    bytes bytes_val = 7;
  }
}

message PbExpression {
  ExprType expr_type = 1;
  repeated PbExpression children = 2;
  optional PbLiteralValue literal = 3;
  optional string column_ref = 4;
  map<string, string> metadata = 5;
}

// ==================== Lazy Update（范围更新）====================

message PbUpdateEntry {
  string entry_id = 1;
  string table_name = 2;
  PbExpression predicate = 3;
  map<string, string> updates = 4; // column -> serialized Comparable value
  int64 timestamp = 5;
}

// ==================== 文件元数据（LSM / DataBlock）====================

enum FileFormat {
  FILE_FORMAT_UNSPECIFIED = 0;
  PARQUET = 1;
  ORC = 2;
}

message PbFileMetadata {
  string file_path = 1;
  int32 level = 2;
  bytes min_key = 3;
  bytes max_key = 4;
  int64 min_commit_ts = 5;
  int64 max_commit_ts = 6;
  int64 file_size_bytes = 7;
  FileFormat format = 8;
  string table_name = 9;
}

// ==================== 操作与事务 ====================

message PbTableOperation {
  string operation_type = 1;
  string table_name = 2;
  optional PbSchema schema = 3;
  map<string, string> properties = 4;
  int64 timestamp = 5;
}

message PbCommitRequest {
  int64 commit_id = 1;
  repeated PbTableOperation operations = 2;
}

message PbOperationResult {
  bool success = 1;
  optional string message = 2;
  optional int64 commit_id = 3;
}

// ==================== 请求/响应 ====================

message PbCreateTableRequest {
  PbTableMetadata metadata = 1;
}

message PbDropTableRequest {
  string table_name = 1;
}

message PbGetTableRequest {
  string table_name = 1;
}

message PbGetSnapshotRequest {
  string table_name = 1;
  int64 snapshot_id = 2;
}

message PbGetSnapshotsRequest {
  string table_name = 1;
}

message PbAlterTableRequest {
  string table_name = 1;
  PbSchema new_schema = 2;
}

message PbListFilesRequest {
  string table_name = 1;
  optional int32 level = 2;
}

message PbListFilesResponse {
  repeated PbFileMetadata files = 1;
}

message PbPutUpdateEntryRequest {
  PbUpdateEntry entry = 1;
}

message PbGetUpdateEntriesRequest {
  string table_name = 1;
}

message PbGetUpdateEntriesResponse {
  repeated PbUpdateEntry entries = 1;
}

message PbDeleteUpdateEntryRequest {
  string entry_id = 1;
}

// ==================== gRPC 服务定义 ====================

service MetastoreService {

  // --- 表管理 ---
  rpc CreateTable(PbCreateTableRequest) returns (PbOperationResult);
  rpc DropTable(PbDropTableRequest) returns (PbOperationResult);
  rpc GetTable(PbGetTableRequest) returns (PbTableMetadata);
  rpc AlterTable(PbAlterTableRequest) returns (PbOperationResult);

  // --- 快照管理 ---
  rpc GetSnapshot(PbGetSnapshotRequest) returns (PbSnapshot);
  rpc GetSnapshots(PbGetSnapshotsRequest) returns (PbSnapshotList);

  // --- 事务 ---
  rpc BeginCommit(PbCommitRequest) returns (PbOperationResult);
  rpc Commit(PbCommitId) returns (PbOperationResult);
  rpc AbortCommit(PbCommitId) returns (PbOperationResult);

  // --- 文件元数据（Compaction / Scan 使用）---
  rpc PutFile(PbFileMetadata) returns (PbOperationResult);
  rpc ListFiles(PbListFilesRequest) returns (PbListFilesResponse);
  rpc RemoveFile(PbFileMetadata) returns (PbOperationResult);

  // --- Lazy Update 管理（范围更新核心）---
  rpc PutUpdateEntry(PbPutUpdateEntryRequest) returns (PbOperationResult);
  rpc GetUpdateEntries(PbGetUpdateEntriesRequest) returns (PbGetUpdateEntriesResponse);
  rpc DeleteUpdateEntry(PbDeleteUpdateEntryRequest) returns (PbOperationResult);
}

message PbSnapshotList {
  repeated PbSnapshot snapshots = 1;
}

message PbCommitId {
  int64 value = 1;
}
