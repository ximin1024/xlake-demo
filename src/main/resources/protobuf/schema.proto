syntax = "proto3";

package nebulake.schema;

option java_package = "io.github.ximin.xlake.schema.proto";
option java_multiple_files = true;

// ==================== 原始类型枚举 ====================
// 与 io.github.ximin.xlake.table.schema.PrimitiveType 对应

enum PbPrimitiveKind {
  PB_PRIMITIVE_UNSPECIFIED = 0;
  BOOLEAN = 1;
  INT8 = 2;
  INT32 = 3;
  INT64 = 4;
  FLOAT32 = 5;
  FLOAT64 = 6;
  DECIMAL = 7;
  STRING = 8;
  BINARY = 9;
  DATE = 10;
  TIMESTAMP = 11;
}

// ==================== 类型系统（多态）====================
// 使用 oneof 实现与 Java sealed interface 层次结构的一一映射
// NebulakeType → PbType (oneof: primitive | array | map | struct)

message PbType {
  oneof kind {
    PbPrimitive primitive = 1;
    PbArray array = 2;
    PbMap map = 3;
    PbStruct struct = 4;
  }
}

// ---- 原始类型 (PrimitiveType) ----
// 对应 BooleanType, Int8Type, Int32Type, Int64Type,
//       Float32Type, Float64Type, DecimalType, StringType,
//       BinaryType, DateType, TimestampType
// DecimalType 特有字段: precision, scale

message PbPrimitive {
  PbPrimitiveKind kind = 1;
  bool is_nullable = 2;
  optional string description = 3;
  // DecimalType 专用参数
  optional int32 precision = 4;
  optional int32 scale = 5;
}

// ---- 数组类型 (ArrayType) ----
// record ArrayType(NebulakeType elementType, boolean isNullable, String description)

message PbArray {
  PbType element_type = 1;   // 递归引用，支持 array<array<int32>> 等嵌套
  bool is_nullable = 2;
  optional string description = 3;
}

// ---- Map 类型 (MapType) ----
// record MapType(NebulakeType keyType, NebulakeType valueType, boolean isNullable, String description)

message PbMap {
  PbType key_type = 1;
  PbType value_type = 2;
  bool is_nullable = 3;
  optional string description = 4;
}

// ---- Struct 字段 (StructField) ----
// record StructField(String name, NebulakeType dataType, String comment, Map<String,String> metadata)

message PbStructField {
  string name = 1;
  PbType data_type = 2;
  optional string comment = 3;
  map<string, string> metadata = 4;
}

// ---- 结构体类型 (StructType) ----
// record StructType(List<StructField> fields, boolean isNullable, String description)

message PbStruct {
  repeated PbStructField fields = 1;
  bool is_nullable = 2;
  optional string description = 3;
}

// ==================== 约束体系（多态）====================
// Constraint (sealed interface) → PbConstraint (oneof)

message PbConstraint {
  oneof kind {
    PbPrimaryKey primary_key = 1;
  }
}

// ---- 主键约束 (PrimaryKeyConstraint) ----
// record PrimaryKeyConstraint(String name, List<String> fieldNames, boolean enforced, String description)

message PbPrimaryKey {
  optional string name = 1;
  repeated string field_names = 2;
  bool enforced = 3;
  optional string description = 4;
}

// ==================== Schema ====================
// record Schema(StructType structType, Map<String,String> properties, long version, List<Constraint> constraints)

message PbSchema {
  PbStruct struct_type = 1;
  map<string, string> properties = 2;
  int64 version = 3;
  repeated PbConstraint constraints = 4;
}
